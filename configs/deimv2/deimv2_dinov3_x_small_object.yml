__include__: [
  '../dataset/custom_detection.yml',
  '../runtime.yml',
  '../base/dataloader.yml',
  '../base/optimizer.yml',
  '../base/deimv2.yml',
]


output_dir: ./outputs/deimv2_dinov3_x_small_object
  
DEIM:
  backbone: DINOv3STAs

DINOv3STAs:
  name: dinov3_vits16plus
  weights_path: ./ckpts/dinov3_vits16plus_pretrain_lvd1689m-4057cbaa.pth
  # Extract features from 4 layers for 4-scale feature pyramid
  # Use n parameter to specify which layers to extract (0-indexed)
  # layers 2,5,8,11 for stride 4,8, 16, 32
  interaction_indexes: [2, 5, 8, 11]
  finetune: True
  conv_inplane: 64
  hidden_dim: 256
  use_p2: True  # Enable P2 feature output (stride=4)
  
HybridEncoder:
  in_channels: [256, 256, 256, 256]  # 4-scale features
  feat_strides: [4, 8, 16, 32]  # P2, P3, P4, P5
  # intra
  hidden_dim: 256
  dim_feedforward: 1024

  # cross 
  expansion: 1.25
  depth_mult: 1.37
  
  # Small object enhancement
  use_p2: True
  use_small_object_enhancement: True  # Enable small object enhancement module

DEIMTransformer:
  num_layers: 6
  eval_idx: -1
  num_levels: 4  # 4-scale feature pyramid
  feat_channels: [256, 256, 256, 256]
  feat_strides: [4, 8, 16, 32]  # P2, P3, P4, P5
  # reg_scale: 8
  hidden_dim: 256
  dim_feedforward: 2048
  num_points: 4  # Must be int, not list
  cross_attn_method: default
  query_select_method: default
  activation: silu
  mlp_act: silu

optimizer:
  type: AdamW
  params: 
    -
      # except norm/bn/bias in self.dinov3
      params: '^(?=.*.dinov3)(?!.*(?:norm|bn|bias)).*$'  
      lr: 0.00001
    -
      # including norm/bn/bias in self.dinov3
      params: '^(?=.*.dinov3)(?=.*(?:norm|bn|bias)).*$'    
      lr: 0.00001
      weight_decay: 0.
    - 
      # including norm/bn/bias except for the self.dinov3
      params: '^(?=.*(?:sta|encoder|decoder|small_obj_enhancer))(?=.*(?:norm|bn|bias)).*$'
      weight_decay: 0.

  lr: 0.0005
  betas: [0.9, 0.999]
  weight_decay: 0.000125

## Dense O2O: Mosaic + Mixup + CopyBlend
train_dataloader: 
  dataset: 
    transforms:
      ops:
        - {type: Mosaic, output_size: 320, rotation_range: 10, translation_range: [0.1, 0.1], scaling_range: [0.5, 1.5],
           probability: 1.0, fill_value: 0, use_cache: True, max_cached_images: 50, random_pop: True}
        - {type: RandomPhotometricDistort, p: 0.5}
        - {type: RandomZoomOut, fill: 0}
        - {type: RandomIoUCrop, p: 0.8}
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: RandomHorizontalFlip}
        - {type: Resize, size: [640, 640], }
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: Normalize, mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}
        - {type: ConvertBoxes, fmt: 'cxcywh', normalize: True}
      policy:
        epoch: [4, 29, 50]   # list 

  collate_fn:
    mixup_epochs: [4, 29]
    stop_epoch: 50
    copyblend_epochs: [4, 50]
    base_size_repeat: 3

val_dataloader:
  dataset:
    transforms:
      ops:
        - {type: Resize, size: [640, 640], }
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: Normalize, mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}
